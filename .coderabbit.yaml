# ─────────── 전역(공통) 설정 ───────────
language: ko-KR
tone_instructions: "1. 리뷰 시에는 변경 사항의 문제점이나 한계점을 구체적으로 짚어주고, \n 2. 왜 해당 부분이 비효율적이거나 권장되지 않는지 명확한 근거와 함께 설명해주세요. \n 3. 대안을 제시할 땐, 선택지를 제안하면서 각각의 장단점도 논리적으로 설명해주세요. \n 4. 단순 지적보다는 개선 방향에 집중하고, 학습적인 관점에서 이해를 돕는 코멘트를 남겨주세요. \n 5. 지나치게 딱딱하지 않되, 논리의 흐름이 분명하게 전달되도록 해주세요."

# ─────────── 리뷰(Reviews) 전반 ───────────
reviews:
  profile: chill
  high_level_summary: true
  high_level_summary_placeholder: "🤖 Code Rabbit PR 요약"
  review_status: true
  commit_status: true

  # 워크스루/자동화/부가 기능
  collapse_walkthrough: false
  changed_files_summary: false
  sequence_diagrams: false
  assess_linked_issues: true
  related_issues: false
  related_prs: false
  suggested_labels: false
  auto_apply_labels: false
  suggested_reviewers: false
  auto_assign_reviewers: false
  poem: false

  # ─────────── 경로별 리뷰 지침 ───────────
  path_instructions:
    # ===== Backend =====
    - path: backend/**
      instructions: |
        - 1. 팀 및 공식 컨벤션, 가독성, 예외처리, 테스트/확장/유지보수성, 모듈화, API/DB/보안 설계 기준을 기반으로 리뷰해주세요.
        - 2. 최신 트렌드, 불필요한 로직, 클린코드, 리팩토링, 서비스/도메인 설계, 공통 예외 처리, 확장성도 함께 확인해주세요.
        - 3. 각 피드백은 문제점·대안·장단점을 짧고 논리적으로, 예시 코드가 있다면 간결히 포함해 주세요.
        - 4. 팀 내 스타일 통일성도 확인해주세요.
        - 5. 미작성한 테스트 코드 케이스가 있다면, 어떤 테스트가 필요한지 제안해주세요. (예: 컨트롤러는 인수 테스트, 나머지는 단위 테스트)
        - 6. 리뷰 남겨주는 부분은 해당 라인 범위의 코멘트에 작성해주세요.

    # ===== Android =====
    - path: android/**
      instructions: |
        - 변경 결과보다 이 코드가 이렇게 작성된 이유와 흐름을 먼저 파악하고 리뷰해주세요.
          무엇을 추가했는지보다 왜 이 구조를 선택했는지가 더 중요합니다.
  
        - 리뷰는 정답을 알려주기보다 질문을 통해 생각을 확장하는 방향을 선호합니다.
          예를 들어
          이 책임은 왜 여기 있어야 할까요?
          이 시점에서 처리되어야 할 이유가 있을까요?
          이 값이 항상 유효하다고 가정해도 괜찮을까요?
          와 같은 질문 형태를 권장합니다.
  
        - 클래스, 함수, 컴포넌트가 하나의 역할만 책임지고 있는지 중심으로 봐주세요.
          역할이 섞여 있다면
          지금은 왜 문제 없어 보이는지,
          나중에 어떤 부분이 먼저 흔들릴 수 있는지를 함께 짚어주세요.
  
        - 네이밍은 문법적 정확성보다 오해 가능성을 기준으로 리뷰해주세요.
          이름만 보고
          더 많은 일을 할 것처럼 느껴지지는 않는지,
          반대로 책임이 숨겨져 있지는 않은지를 살펴봐주세요.
  
        - 상태와 이벤트, 데이터와 표현 결과가 개념적으로 섞여 있지는 않은지 확인해주세요.
          섞여 있다면 지금 단계에서는 왜 괜찮고,
          어느 시점부터 부담이 될 수 있는지를 질문 형태로 남겨주세요.
  
        - 실패, 예외, 경계 조건이 의도적으로 다뤄지고 있는지 확인해주세요.
          단순히 무시되거나 else로 덮여 있다면
          지금 단계에서 감당 가능한 대안이 있는지도 함께 언급해주세요.
  
        - 테스트 코드가 있다면 구현 세부가 아니라
          실제 사용 시나리오나 행위를 검증하고 있는지 중심으로 봐주세요.
          테스트가 리팩터링을 막는 구조는 아닌지도 함께 확인해주세요.
  
        - 지금 당장 고칠 필요는 없지만
          다음 미션이나 다음 리팩터링에서 다시 떠올리면 좋을 포인트는
          강요하지 말고 힌트로 남겨주세요.
  
        - 리뷰 코멘트는
          관찰 → 질문 → 영향 → 선택지
          흐름을 기본으로 합니다.
  
        - 리뷰의 목적은 코드를 통과시키는 것이 아니라
          다음 선택을 더 수월하게 만들기 위함이라는 점을 기준으로 삼아주세요.
  
        - UI 코드는 상태의 결과로 표현되고 있는지 확인해주세요.
          클릭, 계산, 분기 로직이 UI 안에 직접 들어가 있다면
          상태로 밀어낼 수 없는 이유가 있는지 질문해주세요.
  
        - Composable이나 화면 단위 코드가
          상태를 소유하는지,
          상태를 받아 그리기만 하는지
          역할이 섞여 있지는 않은지 확인해주세요.
  
        - remember, LaunchedEffect, SideEffect 같은 API는
          왜 이 위치에 필요한지 설명 가능해 보이는지 기준으로 봐주세요.
          설명이 어렵다면 책임 이동이나 구조 변경 여지가 있는지 질문해주세요.
  
        - 불필요한 recomposition이나 상태 재계산이 발생할 여지가 없는지 살펴봐주세요.
          자주 변하는 상태를 상위에서 들고 있지는 않은지도 함께 봐주세요.
  
        - Composable의 파라미터는
          UI 표현에 필요한 최소 정보만 받고 있는지 확인해주세요.
          도메인 객체 전체를 넘기고 있다면
          분리했을 때의 장단점을 함께 언급해주세요.
  
        - 이벤트 콜백 네이밍은
          클릭 자체를 드러내는지,
          화면의 의도를 드러내는지를 기준으로 리뷰해주세요.
          이벤트 이름이 바뀌면 UI 구조도 바뀔 것 같다면
          네이밍과 책임을 다시 질문해주세요.
  
        - Boolean 상태 이름은 값 자체보다 의미가 드러나는지 기준으로 봐주세요.
          왜 이 상태가 필요한지 코드만 보고 유추 가능한지가 중요합니다.
  
        - Preview는 단순 렌더링 확인이 아니라
          이 컴포넌트가 가질 수 있는 상태 조합을 보여주고 있는지 기준으로 봐주세요.
          Preview가 없다면 특히 도움이 될 컴포넌트를 짚어줘도 좋습니다.
  
        - Compose UI 테스트가 있다면
          구현 세부가 아니라 사용자 관점의 상태 변화를 검증하는지 확인해주세요.
          UI 테스트 없이 단위 테스트로 충분한 부분도 함께 구분해주세요.
  
        - Compose를 사용하면서도
          기존 View 기반의 명령형 사고가 남아 있지는 않은지 확인해주세요.
          남아 있다면 왜 그렇게 두었는지를 먼저 질문해주세요.
  
        - elevation, padding, alignment 등 UI의 미묘한 어색함은
          디자인 제약인지 구조 문제인지 먼저 구분해서 질문해주세요.
          어쩔 수 없는 제약이라면 이유를,
          구조로 풀 수 있다면 선택지를 함께 제시해주세요.
  
        - navigate, show, click, back 같은 단어는
          실제 책임과 어울리는지 기준으로 리뷰해주세요.
          Screen이나 Component가 사용자 입력을 직접 아는 것이 맞는지도 함께 질문해주세요.
  
        - 비슷한 코드가 반복되기 시작했다면
          지금 추출하는 게 좋은지,
          조금 더 반복된 뒤가 좋은지
          판단 근거를 함께 남겨주세요.
  
        - 확장 함수 제안은 재사용성보다
          호출부의 의도가 더 잘 읽히는지를 기준으로 판단해주세요.
  
        - Flow collect, repeatOnLifecycle 같은 패턴이 반복된다면
          개인 취향인지,
          팀 차원의 기본 패턴이 될 수 있는지도 함께 봐주세요.
  
        - StateHolder, UiState, Component 같은 이름은
          위치보다 개념 정의가 먼저라는 전제로 리뷰해주세요.
          처음 보는 사람이 책임을 유추할 수 있는지가 기준입니다.
  
        - 문자열, 날짜, 숫자 포맷은
          당장 다국어를 하지 않더라도
          지역화가 필요한 지점인지 한 번 더 짚어주세요.
  
        - else 분기나 기본값 처리는
          귀찮아서 남긴 것인지,
          의도를 표현한 선택인지 구분해서 질문해주세요.
  
        - intent, navigation, 외부 이동 로직은
          화면 코드에 두는 것이 자연스러운지,
          상위(Activity 등)에서 받아오는 게 나은지도 함께 고민해주세요.
  
        - 변경된 코드가 기존 코드베이스의 스타일, 패턴, 톤과 일관되는지도 함께 확인해주세요.
          이미 쓰이고 있는 방식이 있다면
          왜 여기서는 다른 선택을 했는지,
          의도적인 차이인지 단순한 불일치인지를 질문해주세요.
          이 변화가 새로운 기준이 될 만한지도 함께 생각해보면 좋습니다.
  
        - 리뷰 톤은 지적보다 대화에 가깝게 유지합니다.
          단정형보다는
          나는 이렇게 느껴졌다,
          이런 상황에서는 어떻게 될까
          같은 여지를 남기는 표현을 선호합니다.
          
  # ─────────── 리뷰 진행/자동화 ───────────
  abort_on_close: true
  disable_cache: false

  auto_review:
    enabled: true
    auto_incremental_review: true
    base_branches:
      - develop-be
      - develop-an

  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true

# ─────────── 채팅(Chat) 설정 ───────────
chat:
  auto_reply: true

# ─────────── 지식 기반(Knowledge base) ───────────
knowledge_base:
  opt_out: false

  web_search:
    enabled: true

  code_guidelines:
    enabled: true
    filePatterns:
      - backend/code-style.md
      - android/code-style.md

  learnings:
    scope: auto
  issues:
    scope: local
  pull_requests:
    scope: local

# ─────────── 코드 생성(Code generation) ───────────
code_generation:
  docstrings:
    language: ko-KR
    path_instructions:
      # Backend
      - path: backend/**
        instructions: |
          - JavaDoc 공식 형식으로, 한글로 Docstring을 작성해주세요.
          - 메서드 목적, 파라미터, 반환값, 예외 정보를 명확하게 기술해 주세요.
          - 외부 API 등 공개 메서드는 상세히, 내부용은 핵심만 요약해 주세요.

      # Android
      - path: android/**
        instructions: |
          - Kotlin KDoc 형식으로 Docstring을 작성해주세요.
          - public API는 사용 맥락과 책임을 명확히 설명해주세요.
          - Docstring은 "무엇을 하는지"보다 "왜 이 책임이 여기 있는지"를 설명하는 데 초점을 둡니다.
          - 단순 동작 설명이 아니라 설계 의도가 드러나도록 작성합니다.
          - Composable 함수에는 다음 중 해당되는 역할을 명확히 드러냅니다.
            - 상태를 소유하는 역할인지
            - 상태를 전달받아 UI를 그리는 역할인지
          - ViewModel의 함수에는
            - 언제 호출되는지
            - 어떤 상태 변화를 의도하는지
            - 실패 시 어떤 선택을 했는지
            가 드러나도록 작성합니다.
          - 의미가 자명하지 않은 상태(State), 이벤트(Event), 모델에는
            "왜 필요한 개념인지"를 짧게 설명합니다.
          - 문서가 과도해지지 않도록
            읽는 사람이 다음 코드를 이해하는 데 필요한 최소한의 설명만 작성합니다.

  unit_tests:
    path_instructions:
      # Backend
      - path: backend/**
        instructions: |
          - Controller는 인수테스트(API 엔드포인트 통합 테스트)
          - 나머지 영역은 함수/클래스 단위의 단위 테스트
          - Given-When-Then 패턴을 적용

      # Android
      - path: android/**
        instructions: |
          - 테스트 전략은 단위 테스트(Unit Test)를 최우선으로 합니다.
          - 테스트 프레임워크는 JUnit5, MockK, AssertJ 사용을 전제로 합니다.
          - 테스트 함수명은 한국어로 작성하며, 구현 방식이 아니라 검증하려는 도메인 규칙과 행위를 드러내는 서술형으로 작성합니다.
          - 테스트 이름에는 내부 구현, 메서드명, 예외 타입을 직접 드러내지 않습니다.
          - 하나의 테스트는 하나의 규칙만 검증하며, 같은 규칙군은 표현 톤을 통일합니다.

          [테스트 대상]
          - ViewModel:
            - State(StateFlow / LiveData) 변경 검증
            - 이벤트(Event, SideEffect) 발생 여부 검증
          - Repository:
            - API 응답 처리 로직
            - Domain 모델 변환 로직
            - 캐싱 / 데이터 선택 분기 로직
          - Util / Extension:
            - 날짜 변환, Validation, 파싱 로직
            - 조건 분기 및 상태 전환 로직

          [작성 원칙]
          - given-when-then 네이밍 규칙을 사용합니다.
          - 외부 의존성(Network, DB, Android Framework)은 Mock 또는 Fake로 대체합니다.
          - 값 검증뿐 아니라 상태 변화의 흐름을 함께 검증합니다.
          - 테스트 구조는 실제 코드 패키지 구조와 동일하게 유지합니다.
          - 테스트 코드에는 given / when / then 구분을 설명하는 주석 외의 추가적인 설명 주석은 작성하지 않습니다.

          [Optional]
          - UI 테스트(Espresso / Compose UI Test)는 필수 아님
          - 통합 테스트(Repository + Network)는 프로젝트 성장 이후 점진적으로 추가 제안

# ─────────── 코드 분석 도구(Tools) ───────────
tools:
  hadolint:
    enabled: true
  gitleaks:
    enabled: true
  sqlfluff:
    enabled: true
  oxc:
    enabled: true
