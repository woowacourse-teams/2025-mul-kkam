name: Auto Assign Labels from PR Title

on:
  workflow_run:
    workflows: ["PR Title Sync"]
    types: [completed]
  pull_request:
    types: [edited, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  assign-labels:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'pull_request'

    steps:
      - name: Assign labels based on PR title
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const validLabels = ['AN', 'BE', 'chore', 'docs', 'feat', 'fix', 'refactor', 'style', 'test'];
            
            let prNumber, title;
            
            if (context.eventName === 'workflow_run') {
              // Get PR from workflow_run event
              const runData = context.payload.workflow_run;
              if (runData.pull_requests && runData.pull_requests.length > 0) {
                prNumber = runData.pull_requests[0].number;
                // Fetch latest PR data to get updated title
                const pr = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber
                });
                title = pr.data.title;
              } else {
                core.info('No PR associated with this workflow run');
                return;
              }
            } else {
              // pull_request event
              title = context.payload.pull_request.title;
              prNumber = context.payload.pull_request.number;
            }
            
            const bracketPattern = /\[([^\]]+)\]/g;
            const matches = [...title.matchAll(bracketPattern)];
            const extractedLabels = matches.map(match => match[1]);
            
            const labelsToAdd = extractedLabels.filter(label => validLabels.includes(label));
            
            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: labelsToAdd
              });
              core.info(`Labels added: ${labelsToAdd.join(', ')}`);
            } else {
              core.info('No matching labels found in PR title');
            }
