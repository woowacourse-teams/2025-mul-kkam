name: Auto Assign Labels from Issue Title

on:
  pull_request:
    types: [opened, edited, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  assign-labels:
    runs-on: ubuntu-latest

    steps:
      - name: Assign labels based on linked issue title
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const validLabels = ['AN', 'BE', 'chore', 'docs', 'feat', 'fix', 'refactor', 'style', 'test'];
            
            const prNumber = context.payload.pull_request.number;
            const branchName = context.payload.pull_request.head.ref;
            
            // Extract issue number from branch name (e.g., "feat/1120" -> 1120)
            const branchPattern = /\/(\d+)$/;
            const branchMatch = branchName.match(branchPattern);
            
            if (!branchMatch) {
              core.info(`No issue number found in branch name: ${branchName}`);
              return;
            }
            
            const issueNumber = parseInt(branchMatch[1]);
            core.info(`Extracted issue number from branch: #${issueNumber}`);
            
            try {
              const issue = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber
              });
              
              const issueTitle = issue.data.title;
              core.info(`Found issue #${issueNumber}: ${issueTitle}`);
              
              const bracketPattern = /\[([^\]]+)\]/g;
              const matches = [...issueTitle.matchAll(bracketPattern)];
              const extractedLabels = matches.map(match => match[1]);
              
              const labelsToAdd = extractedLabels.filter(label => validLabels.includes(label));
              
              if (labelsToAdd.length > 0) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  labels: labelsToAdd
                });
                core.info(`Labels added: ${labelsToAdd.join(', ')}`);
              } else {
                core.info('No matching labels found in issue title');
              }
            } catch (error) {
              core.warning(`Could not fetch issue #${issueNumber}: ${error.message}`);
            }
