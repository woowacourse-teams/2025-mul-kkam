server:
  port: 8081

spring:
  # ConsumerлҠ” RabbitMQ AutoConfiguration нҷңм„ұнҷ”
  autoconfigure:
    exclude: []  # л¶ҖлӘЁ м„Өм • мҳӨлІ„лқјмқҙл“ң - RabbitMQ нҷңм„ұнҷ”

  main:
    allow-bean-definition-overriding: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
        concurrency: 3
        max-concurrency: 10

# RabbitMQ нҷңм„ұнҷ”
rabbitmq:
  enabled: true

# Consumer м „мҡ© м„Өм •
consumer:
  enabled: true
  api-server:
    base-url: ${API_SERVER_URL:http://localhost:8080}
  inbox:
    retention-days: 7
  retry:
    max-attempts: 3
    initial-interval: 1000
    multiplier: 2.0
    max-interval: 10000
